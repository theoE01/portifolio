<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>João Almeida | Dev</title>

<style>

/* RESET */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

/* BODY */
body {
  font-family: "Segoe UI", sans-serif;
  background: radial-gradient(circle at top, #4fc3f7, #0d47a1 70%);
  color: white;
  display: flex;
}

/* SIDEBAR */
.sidebar {
  width: 260px;
  min-height: 100vh;
  background: linear-gradient(180deg, rgba(255,255,255,0.25), rgba(255,255,255,0.05));
  backdrop-filter: blur(10px);
  border-right: 1px solid rgba(255,255,255,0.3);
  padding: 20px;
  position: fixed;
}

/* PROFILE */
.profile {
  text-align: center;
}

.profile img {
  width: 120px;
  border-radius: 50%;
  margin-bottom: 15px;
  box-shadow: 0 0 15px rgba(255,255,255,0.6);
}

/* MAIN */
.main {
  margin-left: 260px;
  padding: 30px;
  width: 100%;
}

/* SECTIONS */
.section {
  margin-bottom: 40px;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  gap: 20px;
}

/* CARD BASE */
.card {
  background: linear-gradient(180deg, rgba(255,255,255,0.25), rgba(255,255,255,0.05));
  border-radius: 20px;
  overflow: hidden;
  border: 1px solid rgba(255,255,255,0.3);
  backdrop-filter: blur(8px);
  box-shadow: 0 10px 25px rgba(0,0,0,0.3);
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-6px);
  box-shadow: 0 20px 40px rgba(0,0,0,0.4), 0 0 20px rgba(255,255,255,0.3);
}

/* IMAGEM */
.card img {
  width: 100%;
  height: 200px;
  object-fit: cover; /* ESSENCIAL */
  transition: 0.4s;
}

.card:hover img {
  transform: scale(1.05);
}

/* CONTEÚDO */
.card-content {
  padding: 15px;
}

.card-content h3 {
  margin-bottom: 10px;
}

.card-content p {
  font-size: 14px;
  opacity: 0.9;
}

</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="profile">
    <img src="https://via.placeholder.com/120">
    <h2>João Almeida</h2>
  </div>
</div>

<!-- MAIN -->
<div class="main">

  <!-- PROJETOS -->
  <div class="section">
    <h2>Projetos</h2>

    <div class="grid">

      <!-- AUTO ESCOLA CARD 1 -->
      <div class="card">
        <img src="assets/autoaula.jpg" alt="Auto Escola">
        <div class="card-content">
          <h3>Sistema Auto Escola</h3>
          <p>Gerenciamento de alunos, aulas e processos administrativos.</p>
        </div>
      </div>

      <!-- AUTO ESCOLA CARD 2 -->
      <div class="card">
        <img src="assets/iaautoaula.jpg" alt="Auto Escola UI">
        <div class="card-content">
          <h3>Interface do Sistema</h3>
          <p>Interface focada em organização e usabilidade.</p>
        </div>
      </div>

    </div>
  </div>

</div>

</body>
</html>
